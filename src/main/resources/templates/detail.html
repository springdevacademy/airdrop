<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resource Detail</title>
</head>
<body>
    <h1>Resource Detail</h1>
    <div th:if="${resource}">
        <h2 th:text="${resource.title}">Title</h2>
        <p th:text="${resource.description}">Description</p>
        <p>Category: <span th:text="${resource.category}">Category</span></p>
        <a th:href="${resource.r2DownloadUrl}">Download</a>
    </div>
    <a href="/">Back to Home</a>
</body>
</html>
