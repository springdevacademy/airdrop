<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Add Resource</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Add New Resource Link</h2>
        <!-- Displayed only when an admin is logged in -->
        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
            <span class="text-muted small">Logged in as Admin</span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
        </div>
        <form th:action="@{/admin/add}" th:object="${resource}" method="post">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" th:field="*{title}" class="form-control" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text" th:field="*{category}" class="form-control" placeholder="e.g. Spring Boot" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">GitHub Release Download Link</label>
                <input type="url" th:field="*{downloadUrl}" class="form-control" placeholder="https://github.com/..." required />
            </div>
            <button type="submit" class="btn btn-primary">Save Resource</button>
            <a href="/">Back to home</a>
        </form>
    </div>
</div>
</body>
</html>
