<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dev Resource Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <header class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">Developer Resource Hub</h1>
        <a href="/admin/add" class="btn btn-outline-primary">+ Add New Resource</a>
    </header>

    <div class="row g-4">
        <div class="col-md-4" th:each="res : ${resources}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <span class="badge bg-secondary mb-2" th:text="${res.category}">Category</span>
                    <h5 class="card-title" th:text="${res.title}">Resource Title</h5>
                    <p class="card-text text-muted" th:text="${res.description}">Description...</p>
                </div>
                <div class="card-footer bg-white border-0">
                    <a th:href="${res.downloadUrl}" target="_blank" class="btn btn-success w-100">
                        Download (.zip / .pdf / .docx)
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
